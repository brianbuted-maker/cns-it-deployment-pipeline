name: Secret Scanning (Gitleaks)

# GitHub's native secret scanning is enabled in repo settings; this runs Gitleaks
# in CI as defense-in-depth and to catch custom patterns (UT EIDs, ServiceNow tokens, etc.)
# that the native scanner doesn't know about.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Gitleaks can scan every commit

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
