name: Script Linting

# The bash and PowerShell helpers run with elevated privileges on user machines,
# so they deserve more attention than the typical "throwaway helper script".
# ShellCheck findings appear in workflow logs and as inline run annotations.
# PSScriptAnalyzer findings are uploaded as SARIF to the Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck (bash)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
        # Don't fail the job on warnings; findings surface as annotations on the run.
        continue-on-error: true

  psscriptanalyzer:
    name: PSScriptAnalyzer (PowerShell)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -ReportSummary `
            -Severity @('Error','Warning','Information')

          # Convert PSScriptAnalyzer results to SARIF for the Security tab
          $sarif = @{
            version = '2.1.0'
            '$schema' = 'https://json.schemastore.org/sarif-2.1.0.json'
            runs = @(@{
              tool = @{ driver = @{ name = 'PSScriptAnalyzer'; informationUri = 'https://github.com/PowerShell/PSScriptAnalyzer' } }
              results = @($results | ForEach-Object {
                @{
                  ruleId  = $_.RuleName
                  level   = switch ($_.Severity) { 'Error' { 'error' } 'Warning' { 'warning' } default { 'note' } }
                  message = @{ text = $_.Message }
                  locations = @(@{
                    physicalLocation = @{
                      artifactLocation = @{ uri = (Resolve-Path -Relative $_.ScriptPath) -replace '^\.[\\/]', '' }
                      region = @{ startLine = $_.Line; startColumn = $_.Column }
                    }
                  })
                }
              })
            })
          }
          $sarif | ConvertTo-Json -Depth 20 | Out-File psscriptanalyzer.sarif -Encoding utf8

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: psscriptanalyzer.sarif
          category: psscriptanalyzer
